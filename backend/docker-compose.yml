services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: S1BddSpHM!@2026
      POSTGRES_DB: exclusive_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL Local
      - HOST_LOCAL=postgres
      - PORT_LOCAL=5432
      - DATABASE_LOCAL=exclusive_db
      - USER_LOCAL=postgres
      - PASSWORD_LOCAL=S1BddSpHM!@2026
      # PostgreSQL Production
      - DATABASE=exxe_db_sql
      - USER=myuser
      - PASSWORD=password_myuser_baru
      - HOST=103.27.206.88
      - APP_ENV=local
      # Database URL
      - DATABASE_URL=postgresql://postgres:S1BddSpHM!@2026@postgres:5432/exclusive_db
      # JWT
      - JWT_SECRET=9f3c2a7d8e1b4a6c9d0f2e8a7b6c5d4e
      - SECRET_KEY=jdk256!&^
      # MongoDB Local
      - URL_MONGO_LOCAL=mongodb://mongo:27017
      - DATABASE_LOCAL_MONGO=EXXE_LOCAL_DB
      # MongoDB Production
      - URL_MONGO=mongodb://103.27.206.88:27017
      - DATABASE_MONGO=EXXE_DB
      # SMTP
      - SMTP_PASS=gnpqtsetqveddvog
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=edwardfarrel79@gmail.com
      # API Keys
      - general_news=pub_9404c5613fba4f0098992a1890a53a5a
      - api_key_ai=AIzaSyDwAjeaoPvWy-_uLJ4MqqIXNFaG82kPvSY
      - BSC_TRACE_URL=https://bsc-mainnet.nodereal.io/v1/4783909943f847d386f00062b0fe06f5
      - INTERNAL_API_KEY=a3f8c2e1d4b7a9f0e2c5d8b1a4f7c0e3d6b9a2f5c8e1d4b7a0f3c6e9d2b5a8f1
      - API_NEWS=pub_1ab61fb9bdb049ba966d9f06370bb741
      - TZ=UTC
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    command: uvicorn core.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./:/app
      - ./images_folder_path_exclusive:/app/core/images_folder_path_exclusive
      - ./images_street_view_path:/app/core/images_street_view_path
      - ./images_research_coin_path:/app/core/images_research_coin_path
      - ./images_quant_path:/app/core/images_quant_path
      - ./market_outlook_path:/app/core/market_outlook_path
      - ./images_daily_research_path:/app/core/images_daily_research_path
      - ./uploads_images_profile:/app/core/uploads_images_profile
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
