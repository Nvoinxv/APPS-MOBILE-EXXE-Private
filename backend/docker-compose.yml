services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exclusive_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/exclusive_db
      - TZ=UTC
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    command: uvicorn core.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      # Mount seluruh source code untuk hot reload
      - ./:/app

      # ── Image folders ─────────────────────────────────────────────────────
      # FIX: path di dalam container HARUS sesuai dengan BASE_DIR/main.py
      # BASE_DIR = /app/core  (lokasi main.py)
      # Jadi semua folder gambar harus di bawah /app/core/
      - ./images_folder_path_exclusive:/app/core/images_folder_path_exclusive
      - ./images_street_view_path:/app/core/images_street_view_path
      - ./images_research_coin_path:/app/core/images_research_coin_path
      - ./images_quant_path:/app/core/images_quant_path
      - ./market_outlook_path:/app/core/market_outlook_path
      - ./images_daily_research_path:/app/core/images_daily_research_path
      - ./uploads_images_profile:/app/core/uploads_images_profile

    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
