workflows:
  flutter-app:
    name: Flutter App

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter pub get
        script: |
          cd frontend
          flutter pub get

      - name: Build Android APK
        script: |
          cd frontend
          flutter build apk --release

      - name: Build iOS IPA
        script: |
          cd frontend
          flutter build ipa --release --no-codesign